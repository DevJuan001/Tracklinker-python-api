<!doctype html>
<html>
  <body
    style="
      font-family:
        DM Sans,
        sans-serif;
      padding: 20px;
      background-color: #f5f5f5;
    "
  >
    <div style="max-width: 600px; margin: 0 auto">
      <div
        style="
          background-color: #ffffff;
          border-radius: 12px;
          overflow: hidden;
          padding: 30px;
        "
      >
        <img
          src="https://i.ibb.co/ycbLpR5w/tracklinker-logo-pdf.png"
          alt="tracklinker logo pdf"
          style="max-width: 200px"
        />
        <p style="font-size: 15px; color: #333">
          Se ha registrado una nueva sugerencia o error
        </p>

        <div
          style="
            background-color: #f3f0ff;
            border-left: 4px solid #6c63ff;
            border-radius: 8px;
            padding: 20px;
            margin: 24px 0;
          "
        >
          <p style="margin: 0 0 8px; color: #444">
            <span
              style="
                color: #888;
                font-size: 12px;
                display: block;
                margin-bottom: 2px;
              "
              >Enviado por:</span
            >
            <strong style="font-family: monospace; font-size: 15px"
              >{{email}}</strong
            >
          </p>
          <p style="margin: 0; color: #444">
            <span
              style="
                color: #888;
                font-size: 12px;
                display: block;
                margin-bottom: 2px;
              "
              >Sugerencia o error:</span
            >
            <strong style="font-family: monospace; font-size: 15px"
              >{{suggestion}}</strong
            >
          </p>
        </div>
      </div>
    </div>

    <p
      style="text-align: center; color: #aaa; font-size: 12px; margin-top: 40px"
    >
      Este es un correo automático,<br />
      Por favor, no respondas a este mensaje. <br />
      © 2026 Tracklinker. Todos los derechos reservados.
    </p>
  </body>
</html>
